apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  labels:
    app: load-generator
spec:
  replicas: 2  # Two load generator pods
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: http-load
        image: getback
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting HTTP load generator..."
          while true; do
            python clients/http_client.py http://getback:9091/
            sleep 2
          done
      - name: tcp-load
        image: getback
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting TCP load generator..."
          while true; do
            # Mix of command types
            python clients/tcp_client.py getback 9092 test
            sleep 1
            python clients/tcp_client.py getback 9092 3
            sleep 1
            python clients/tcp_client.py getback 9092 5
            sleep 1
          done
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
