apiVersion: skupper.io/v2alpha1  
kind: MultiKeyListener  
metadata:  
  name: mkl-backend  
spec:  
  host: mkl-backend  
  port: 19092  
  strategy:  
    weighted:  
      routingKeys:  
        east-backend: 1  
        west-backend: 1
---
apiVersion: skupper.io/v2alpha1
kind: MultiKeyListener
metadata:
  name: mkl-backend-http
spec:
  host: mkl-backend-http
  port: 19091
  strategy:
    weighted:
      routingKeys:
        east-backend-http: 1
        west-backend-http: 1