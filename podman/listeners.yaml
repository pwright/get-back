apiVersion: skupper.io/v2alpha1  
kind: MultiKeyListener  
metadata:  
  name: mkl-backend
  namespace: default  
spec:  
  host: 0.0.0.0  
  port: 39092  
  strategy:  
    weighted:  
      routingKeys:  
        podman-backend-1: 1  
        podman-backend-2: 1  
---  
apiVersion: skupper.io/v2alpha1  
kind: MultiKeyListener  
metadata:  
  name: mkl-backend-http
  namespace: default  
spec:  
  host: 0.0.0.0  
  port: 39091  
  strategy:  
    weighted:  
      routingKeys:  
        podman-backend-http-1: 1
        podman-backend-http-2: 1