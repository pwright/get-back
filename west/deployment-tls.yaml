apiVersion: apps/v1
kind: Deployment
metadata:
  name: getback-tls
  namespace: west
  labels:
    app: getback-tls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: getback-tls
  template:
    metadata:
      labels:
        app: getback-tls
    spec:
      containers:
      - name: getback
        image: quay.io/pwright/getback:latest
        command: ["python", "-m", "getback"]
        env:
        - name: HTTP_PORT
          value: "9091"
        - name: TCP_PORT
          value: "9092"
        - name: DASHBOARD_PORT
          value: "9093"
        - name: HOST
          value: "0.0.0.0"
        - name: BACKEND_ID
          value: "west-tls"
        - name: BACKEND_HOST
          value: "getback-tls"
        - name: LOG_LEVEL
          value: "INFO"
        - name: TLS_CERT_PATH
          value: "/etc/tls/cert.pem"
        - name: TLS_KEY_PATH
          value: "/etc/tls/key.pem"
        ports:
        - containerPort: 9091
          name: https
          protocol: TCP
        - containerPort: 9092
          name: tls-tcp
          protocol: TCP
        - containerPort: 9093
          name: dashboard
          protocol: TCP
        volumeMounts:
        - name: tls-cert
          mountPath: /etc/tls
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: tls-cert
        secret:
          secretName: getback-tls-cert
