apiVersion: v1
kind: Service
metadata:
  name: getback-dashboard
  namespace: west
  labels:
    app: getback
spec:
  type: ClusterIP
  selector:
    app: getback
  ports:
  - name: dashboard
    port: 9093
    targetPort: 9093
    protocol: TCP
  sessionAffinity: None  # No sticky sessions - demonstrates load balancing
