apiVersion: v1
kind: Service
metadata:
  name: getback
  namespace: default
  labels:
    app: getback
spec:
  type: ClusterIP
  selector:
    app: getback
  ports:
  - name: http
    port: 9091
    targetPort: 9091
    protocol: TCP
  - name: tcp
    port: 9092
    targetPort: 9092
    protocol: TCP
  - name: dashboard
    port: 9093
    targetPort: 9093
    protocol: TCP
  sessionAffinity: None  # No sticky sessions - demonstrates load balancing
